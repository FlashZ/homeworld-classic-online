name: HWOnlineInstaller Release

on:
  push:
    branches:
      - main
    paths:
      - "installer/hwclient_setup.cs"
      - "installer/hwclient_setup.manifest"
      - "installer/build_installer.bat"
      - "installer/write_assembly_info.ps1"
      - "keys/kver.kp"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate version from date and short SHA
        id: version
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyy.M.d"
          $sha = $env:GITHUB_SHA.Substring(0, 7)
          $tag = "installer-v$date"
          $version = "$date.0"
          $outputName = "HWOnlineSetup-$tag.exe"

          "tag=$tag"               >> $env:GITHUB_OUTPUT
          "informational_version=$tag+$sha" >> $env:GITHUB_OUTPUT
          "file_version=$version"  >> $env:GITHUB_OUTPUT
          "assembly_version=$version" >> $env:GITHUB_OUTPUT
          "output_name=$outputName" >> $env:GITHUB_OUTPUT

      - name: Build HWOnline installer
        env:
          INSTALLER_VERSION: ${{ steps.version.outputs.informational_version }}
          INSTALLER_FILE_VERSION: ${{ steps.version.outputs.file_version }}
          INSTALLER_ASSEMBLY_VERSION: ${{ steps.version.outputs.assembly_version }}
          INSTALLER_OUTPUT_NAME: ${{ steps.version.outputs.output_name }}
        shell: cmd
        run: installer\build_installer.bat

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.output_name }}
          path: installer/${{ steps.version.outputs.output_name }}
          if-no-files-found: error

      - name: Generate release notes from installer commits
        id: notes
        shell: pwsh
        run: |
          $lastRelease = git tag --list "installer-v*" --sort=-creatordate | Select-Object -First 1
          if ($lastRelease) {
            $log = git log --pretty=format:"- %s (%h)" "$lastRelease..HEAD" -- installer/ keys/kver.kp
          } else {
            $log = git log --pretty=format:"- %s (%h)" -10 -- installer/ keys/kver.kp
          }
          if (-not $log) { $log = "- Installer update" }
          $log = $log -join "`n"
          # Write multiline output
          "notes<<ENDOFNOTES" >> $env:GITHUB_OUTPUT
          $log >> $env:GITHUB_OUTPUT
          "ENDOFNOTES" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "HWOnlineSetup ${{ steps.version.outputs.tag }}"
          body: |
            ## Installer update

            ${{ steps.notes.outputs.notes }}

            Download `${{ steps.version.outputs.output_name }}` below, run as Administrator, and follow the prompts.
          files: installer/${{ steps.version.outputs.output_name }}
          fail_on_unmatched_files: true
          make_latest: true
